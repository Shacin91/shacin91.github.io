<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AHP Research Utility</title>
    <!-- Load Plotly for Graphs -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .matrix-input { width: 60px; padding: 5px; }
        table { border-collapse: collapse; margin: 20px 0; }
        td { padding: 5px; }
        .consistent { color: green; font-weight: bold; }
        .inconsistent { color: red; font-weight: bold; }
        #chart { width: 100%; height: 400px; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>AHP Calculation Tool</h1>
    <label>Criteria Count: </label>
    <input type="number" id="n" value="3" min="2" max="10">
    <button onclick="createMatrix()">Generate Matrix</button>

    <div id="matrixArea"></div>
    <div id="status" class="status"></div>
    <div id="chart"></div>

    <script src="script.js"></script>
</body>
</html>
